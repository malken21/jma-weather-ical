name: Monthly Workflow Keepalive

on:
  schedule:
    - cron: '0 0 1 * *' # 毎月1日 00:00 UTC
  workflow_dispatch: # 手動実行可能にする

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Enable all workflows
        run: gh workflow enable --all
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
